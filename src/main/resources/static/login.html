<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexventa - Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
    <div class="login-contenedor">

        <div class="login-cabecera">
            <div class="login-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
            </div>

            <h2 class="login-cabecera__titulo">Nexventa</h2>
            <p class="login-cabecera__subtitulo">Inicia sesión para continuar</p>
        </div>

        <div class="login-selector">
            <button class="login-selector__btn login-selector__btn--activo" id="btn-correo">Correo</button>
            <button class="login-selector__btn" id="btn-telefono">Teléfono</button>
        </div>

        <div class="login-formulario">
            <div class="campo">
                <label class="campo__etiqueta" for="identificador" id="label-identificador">correo</label>
                <input class="campo__input" type="email" id="identificador" placeholder="correo@nexventa.com">
            </div>

            <div class="campo">
                <label class="campo__etiqueta" for="contrasena">Contraseña</label>
                <input class="campo__input" type="password" id="contrasena" placeholder="••••••••" />
            </div>

            <p class="login-error" id="login-error"></p>

            <button class="login-boton" id="btn-ingresar">Iniciar sesión</button>

            <p class="login-aviso">¿No tienes cuenta? Contacta a tu supervisor</p>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
